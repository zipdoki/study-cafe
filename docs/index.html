<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="/study-cafe/">
  <title>study cafe</title>
  <link rel="icon" href="https://avatars.githubusercontent.com/u/112409928">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/turndown@7/dist/turndown.js"></script>
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="app-identity">
          <img class="app-avatar" src="https://avatars.githubusercontent.com/u/112409928" alt="">
          <span class="app-title">study cafe</span>
        </div>
        <div class="sidebar-header-actions">
          <button id="btn-new-file" title="새 파일"></button>
          <button id="btn-collapse-sidebar" title="사이드바 접기"></button>
        </div>
      </div>
      <div id="file-tree"></div>
    </aside>

    <div id="sidebar-resizer"></div>

    <main id="main">
      <div id="toolbar">
        <div id="file-path-container">
          <span id="file-path-display" class="file-path placeholder"></span>
          <input id="file-path-input" class="file-path-edit" type="text" placeholder="경로 입력 후 Enter" style="display:none">
        </div>
        <div id="toolbar-actions">
          <span id="status-text" class="status"></span>
          <button id="btn-width" class="btn-theme" title="너비 전환">⇔</button>
          <button id="btn-theme" class="btn-theme" title="테마 변경">Aa</button>
          <button id="btn-save" disabled>save</button>
        </div>
      </div>

      <div id="editor-container">
        <div id="editor"></div>
      </div>

      <div id="dir-view" style="display:none">
        <div id="dir-files-grid"></div>
      </div>
    </main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
